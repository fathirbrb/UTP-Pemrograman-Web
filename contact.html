<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />

<body>

    <nav class="navbar">
        <span class="nav-brand">Contact</span>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Halaman Utama</a></li>
            <li><a href="about.html" class="nav-link">Tentang</a></li>
            <li><a href="skills.html" class="nav-link">Keahlian</a></li>

        </ul>
        <a href="contact.html" class="btn btn-primary">Hubungi Aku</a>

    <div class="page-header">
        <h1>Contact</h1>
        <p>Hubungi aku atau daftar program magang di sini</p>
    </div>

    <div class="page-content">

        <div class="two-col">

            <!-- Kiri: Info kontak -->
            <div class="card">
                <h3 class="card-title">📬 Info Kontak</h3>

                <div class="contact-list">
                    <div class="contact-item">
                        <span class="contact-icon">💬</span>
                        <div>
                            <p class="contact-label">WhatsApp</p>
                            <a href="https://wa.me/6282369417470" class="contact-value">+62 82369417470</a>
                        </div>
                    </div>

                    <div class="contact-item">
                        <span class="contact-icon">🐙</span>
                        <div>
                            <p class="contact-label">GitHub</p>
                            <a href="https://github.com/fathirbrb" target="_blank"
                                class="contact-value">github.com/fathirbrb</a>
                        </div>
                    </div>

                    <div class="contact-item">
                        <span class="contact-icon">📸</span>
                        <div>
                            <p class="contact-label">Instagram</p>
                            <a href="https://instagram.com/fathirbrb" target="_blank"
                                class="contact-value">@fathirbrb</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kanan: Form pendaftaran magang -->
            <div class="card">
                <h3 class="card-title">📝 Kirim Pesan</h3>

                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-input" placeholder="Masukkan nama kamu" />
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="email@kamu.com" />
                </div>

                <div class="form-group">
                    <label class="form-label">Subjek</label>
                    <input type="text" class="form-input" placeholder="Topik pesan kamu" />
                </div>

                <div class="form-group">
                    <label class="form-label">Pesan</label>
                    <textarea class="form-input form-textarea" placeholder="Tulis pesanmu di sini..."></textarea>
                </div>

                <a href="#" class="btn btn-primary" style="width: 100%; display: block; text-align: center;">
                    Kirim Pesan →
                </a>
            </div>

        </div>
